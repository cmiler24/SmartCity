<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Events & Programs | SmartCity Hub</title>

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/events.css">
    <link rel="stylesheet" href="/css/header.css">
</head>

<body>

<div id="header"></div>

<main>
    <section class="events-hero">
        <h1>Community Events & Programs</h1>
        <p>Explore local activities, volunteer opportunities, public programs, and city events.</p>
    </section>

    <section class="events-content">
        <section class="filter-panel">
            <div class="filter-title-row">
                <h2>Filter Events</h2>
                <button id="clearFiltersBtn" class="clear-button">Clear</button>
            </div>

            <div class="filter-controls">
                <div class="filter-group">
                    <label for="categoryFilter">Category</label>
                    <select id="categoryFilter">
                        <option value="all">All Categories</option>
                        <option value="community-service">Community Service</option>
                        <option value="sports">Sports</option>
                        <option value="public-safety">Public Safety</option>
                        <option value="education">Education</option>
                        <option value="environment">Environment</option>
                        <option value="cultural-activities">Cultural Activities</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="costFilter">Cost</label>
                    <select id="costFilter">
                        <option value="all">Free or Paid</option>
                        <option value="free">Free</option>
                        <option value="paid">Paid</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="events-area">
            <div class="events-heading">
                <h2>Upcoming Events</h2>
                <p id="eventCount">6 events found</p>
            </div>

            <div id="eventsGrid" class="events-grid">

            </div>

            <p id="noResults" class="no-results">No events match your selected filters.</p>
        </section>
    </section>
</main>

<footer>
    <p>© 2026 SmartCity Hub</p>
</footer>

<script src="/js/header.js"></script>
<script src="/js/index.js"></script>
<script src="/js/auth-modal.js"></script>
<script src="/js/events.js"></script>
</body>
</html>
