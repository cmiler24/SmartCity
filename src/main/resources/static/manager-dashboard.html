<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard | SmartCity Hub</title>

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/manager-dash.css">
    <link rel="stylesheet" href="/css/header.css">
</head>

<body>

<div id="header"></div>

<main class="manager-dashboard">
    <section class="manager-cards">
        <button class="dashboard-card" onclick="scrollToSection('assignServiceSection')">
            <h3>Assign Service</h3>
            <p>Assign services to your department workers</p>
        </button>

        <button class="dashboard-card" onclick="scrollToSection('servicesSection')">
            <h3>Manage Services</h3>
            <p>Track and manage assigned services</p>
        </button>
    </section>

    <div class="manager-container">
        <!-- Assign Service Section -->
        <section class="manager-section" id="assignServiceSection">
            <div class="section-header">
                <h2>Assign Service</h2>
                <div class="section-header-buttons">
                    <button class="btn-primary" onclick="openCreateServiceModal()">+ Assign New Service</button>
                </div>
            </div>

            <div class="manager-list">
                <div id="servicesList" class="items-list">
                </div>
            </div>
        </section>

        <!-- Services Overview Section -->
        <section class="manager-section" id="servicesSection">
            <div class="section-header">
                <h2>Service Overview</h2>
                <div class="task-filters">
                    <select id="statusFilter" onchange="filterServices()">
                        <option value="">All Statuses</option>
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
            </div>

            <div id="servicesOverview" class="services-overview">
            </div>
        </section>
    </div>
</main>

<!-- Create/Assign Service Modal -->
<div id="createServiceModal" class="modal" onclick="closeServiceModalOnBackdrop(event)">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Assign Service</h2>
            <button class="modal-close" onclick="closeCreateServiceModal()">&times;</button>
        </div>

        <!-- Tabs for Create vs Select -->
        <div style="display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid #e0e0e0; padding: 0 20px;">
            <button type="button" id="createTabBtn" class="tab-btn" style="padding: 10px 15px; border: none; background: none; cursor: pointer; font-weight: bold; color: #d97706; border-bottom: 3px solid #d97706;" onclick="switchServiceTab('create')">+ Create New</button>
            <button type="button" id="selectTabBtn" class="tab-btn" style="padding: 10px 15px; border: none; background: none; cursor: pointer; font-weight: bold; color: #999;" onclick="switchServiceTab('select')">Select Existing</button>
        </div>

        <!-- Create Service Form -->
        <div id="createServicePanel" style="display: block;">
            <form id="createServiceForm" class="modal-form">
                <div class="form-group">
                    <label for="serviceTitle">Service Title</label>
                    <input type="text" id="serviceTitle" required>
                </div>

                <div class="form-group">
                    <label for="serviceDescription">Description</label>
                    <textarea id="serviceDescription" rows="4" required></textarea>
                </div>

                <div class="form-group">
                    <label for="serviceLocation">Location</label>
                    <input type="text" id="serviceLocation" placeholder="Enter service location" required>
                </div>

                <div class="form-group">
                    <!-- TODO: Populate with actual department workers -->
                    <select id="serviceWorker" required>
                        <option value="">Select a worker</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="serviceDueDate">Due Date</label>
                    <input type="date" id="serviceDueDate" required>
                </div>

                <div class="form-group">
                    <label for="servicePriority">Priority</label>
                    <select id="servicePriority" required>
                        <option value="1">Low (1)</option>
                        <option value="2">Medium-Low (2)</option>
                        <option value="3" selected>Medium (3)</option>
                        <option value="4">Medium-High (4)</option>
                        <option value="5">High (5)</option>
                    </select>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeCreateServiceModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Create & Assign Service</button>
                </div>
            </form>
        </div>

        <!-- Select Existing Service Panel -->
        <div id="selectServicePanel" style="display: none;">
            <form id="selectServiceForm" class="modal-form">
                <div class="form-group">
                    <label for="availableServiceSelect">Select a Service</label>
                    <select id="availableServiceSelect" required onchange="populateServiceDetails()">
                        <option value="">Choose a service...</option>
                    </select>
                </div>

                <div id="serviceDetailsContainer" style="display: none;">
                    <div class="form-group">
                        <label>Service Title</label>
                        <input type="text" id="selectedServiceTitle" readonly style="background-color: #f0f0f0;">
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="selectedServiceDescription" rows="3" readonly style="background-color: #f0f0f0;"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Issue Type</label>
                        <input type="text" id="selectedServiceIssueType" readonly style="background-color: #f0f0f0;">
                    </div>

                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="selectedServiceLocation" readonly style="background-color: #f0f0f0;">
                    </div>

                    <div class="form-group">
                        <label>Current Status</label>
                        <input type="text" id="selectedServiceStatus" readonly style="background-color: #f0f0f0;">
                    </div>

                    <div class="form-group">
                        <label for="selectServiceWorker">Assign to Worker</label>
                        <select id="selectServiceWorker" required>
                            <option value="">Select a worker</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="selectServiceDueDate">Due Date</label>
                        <input type="date" id="selectServiceDueDate" required>
                    </div>

                    <div class="form-group">
                        <label for="selectServicePriority">Priority</label>
                        <select id="selectServicePriority" required>
                            <option value="1">Low (1)</option>
                            <option value="2">Medium-Low (2)</option>
                            <option value="3" selected>Medium (3)</option>
                            <option value="4">Medium-High (4)</option>
                            <option value="5">High (5)</option>
                        </select>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeCreateServiceModal()">Cancel</button>
                    <button type="submit" class="btn-primary" id="assignButton" disabled>Assign Service</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Edit Service Modal -->
<div id="editServiceModal" class="modal" onclick="closeEditServiceModalOnBackdrop(event)">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Edit Service</h2>
            <button class="modal-close" onclick="closeEditServiceModal()">&times;</button>
        </div>

        <form id="editServiceForm" class="modal-form">
            <div class="form-group">
                <label for="editServiceTitle">Service Title</label>
                <input type="text" id="editServiceTitle" required>
            </div>

            <div class="form-group">
                <label for="editServiceDescription">Description</label>
                <textarea id="editServiceDescription" rows="4" required></textarea>
            </div>

            <div class="form-group">
                <label for="editServiceLocation">Location</label>
                <input type="text" id="editServiceLocation" placeholder="Enter service location" required>
            </div>

            <div class="form-group">
                <select id="editServiceStatus" required>
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Completed">Completed</option>
                </select>
            </div>

            <div class="form-group">
                <label for="editServiceDueDate">Due Date</label>
                <input type="date" id="editServiceDueDate" required>
            </div>

            <div class="form-group">
                <label for="editServicePriority">Priority</label>
                <select id="editServicePriority" required>
                    <option value="1">Low (1)</option>
                    <option value="2">Medium-Low (2)</option>
                    <option value="3">Medium (3)</option>
                    <option value="4">Medium-High (4)</option>
                    <option value="5">High (5)</option>
                </select>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn-secondary" onclick="closeEditServiceModal()">Cancel</button>
                <button type="submit" class="btn-primary">Update Service</button>
            </div>
        </form>
    </div>
</div>

<script src="/js/constants.js"></script>
<script src="/js/header.js"></script>
<script src="/js/auth-modal.js"></script>
<script src="/js/manager-dashboard.js"></script>
</body>
</html>
